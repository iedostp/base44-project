name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    name: Build TWA APK
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -alias debug \
            -keypass android \
            -keystore debug.keystore \
            -storepass android \
            -dname "CN=Debug,O=BonimBayit,C=IL" \
            -validity 10000 \
            -keyalg RSA \
            -keysize 2048

      - name: Setup Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.5

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: |
          ./gradlew assembleRelease \
            -PKEYSTORE_PATH=debug.keystore \
            -PKEYSTORE_PASSWORD=android \
            -PKEY_ALIAS=debug \
            -PKEY_PASSWORD=android

      - name: Print SHA-256 fingerprint
        run: |
          echo "=== SHA-256 Certificate Fingerprint ==="
          echo "(Update public/.well-known/assetlinks.json with this)"
          keytool -list -v -keystore debug.keystore -alias debug -storepass android | grep -i "sha.*256"

      - name: List built APKs
        run: |
          find . -name "*.apk" -type f
          ls -la app/build/outputs/apk/debug/*.apk 2>/dev/null || true
          ls -la app/build/outputs/apk/release/*.apk 2>/dev/null || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bonim-bayit-debug
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: bonim-bayit-release
          path: android/app/build/outputs/apk/release/*.apk
